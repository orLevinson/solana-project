services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: sniper-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./volume:/app/volume
    networks:
      - sniper-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "6"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sniper-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./volume:/app/volume
      # Note: We mount readonly because the API only reads state, never writes it.
      # This enforces architectural safety — the bot owns the state.
    networks:
      - sniper-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "6"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: sniper-dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - sniper-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "6"

  caddy:
    image: caddy:alpine
    container_name: sniper-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sniper-net
    depends_on:
      - dashboard

networks:
  sniper-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
